<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Roundtable - Your AI Panel of Real Estate's Best Minds</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A85C;
            --gold-bright: #E5C87E;
            --ink: #0B0B0D;
            --charcoal: #131316;
            --line: rgba(201, 168, 92, 0.25);
            --ivory: #F5F1E8;
            --muted: #8E887B;
            --paper: #FFFFFF;
            --paper-soft: #F7F5F0;
            --text: #17150F;
            --text-soft: #5B564B;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(201,168,92,0.14), transparent 60%), var(--ink);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }
        button { cursor: pointer; font-family: 'Inter', sans-serif; }
        button:focus-visible, textarea:focus-visible, a:focus-visible {
            outline: 2px solid var(--gold-bright);
            outline-offset: 2px;
        }

        /* ===== Top Nav ===== */
        nav.topbar {
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            padding: 12px clamp(14px, 3vw, 28px);
            border-bottom: 1px solid var(--line);
            background: rgba(11,11,13,0.85);
            backdrop-filter: blur(14px);
            position: sticky; top: 0; z-index: 40;
        }
        .nav-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .back-link {
            display: inline-flex; align-items: center; gap: 7px;
            color: var(--muted); text-decoration: none; font-size: 0.8em; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 8px 12px; border: 1px solid var(--line); border-radius: 4px;
            transition: all 0.2s ease; white-space: nowrap;
        }
        .back-link:hover { color: var(--ink); background: var(--gold); border-color: var(--gold); }
        .back-link svg { width: 15px; height: 15px; stroke: currentColor; }
        .brand-mini {
            display: flex; align-items: center; gap: 9px; min-width: 0;
            text-decoration: none;
        }
        .brand-mini svg { width: 26px; height: 26px; flex: 0 0 auto; }
        .brand-mini span {
            font-family: 'Cinzel', serif; font-size: 1.02em; font-weight: 600;
            letter-spacing: 0.1em; color: var(--gold); text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .nav-right { display: flex; align-items: center; gap: 9px; }
        .nav-btn {
            padding: 8px 14px; font-size: 0.76em; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            background: transparent; color: var(--gold); border: 1px solid var(--line);
            border-radius: 4px; transition: all 0.2s ease; white-space: nowrap;
        }
        .nav-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }
        .status-line {
            display: inline-flex; align-items: center; gap: 7px;
            font-size: 0.72em; color: var(--muted); white-space: nowrap;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
        .dot.online { background: #4ade80; }
        .dot.offline { background: #ef4444; }
        @media (max-width: 720px) {
            .status-line span:last-child { display: none; }
            .brand-mini span { display: none; }
        }

        /* ===== Advisor panel (collapsible) ===== */
        .setup {
            max-width: 900px; margin: 14px auto 0; width: calc(100% - 28px);
        }
        details.advisors {
            background: var(--charcoal);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--ivory);
        }
        details.advisors summary {
            cursor: pointer; list-style: none;
            padding: 13px 18px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.86em; font-weight: 600; letter-spacing: 0.06em;
            color: var(--gold-bright); text-transform: uppercase;
        }
        details.advisors summary::-webkit-details-marker { display: none; }
        details.advisors summary .count { color: var(--muted); text-transform: none; font-weight: 400; letter-spacing: 0; }
        .advisor-body { padding: 4px 18px 18px; }
        .panel-actions { display: flex; gap: 10px; margin-bottom: 12px; }
        .panel-actions button {
            padding: 6px 14px; font-size: 0.75em; border-radius: 3px;
            background: transparent; color: var(--gold); border: 1px solid var(--line);
            transition: all 0.2s ease;
        }
        .panel-actions button:hover { background: var(--gold); color: var(--ink); }
        .group-label {
            font-size: 0.72em; font-weight: 700; color: var(--gold);
            letter-spacing: 0.08em; margin: 12px 0 7px; text-transform: uppercase;
        }
        .chip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 7px; }
        .chip-grid label {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 8px 10px; border: 1px solid rgba(201,168,92,0.18); border-radius: 4px;
            cursor: pointer; transition: border-color 0.2s ease; background: rgba(255,255,255,0.02);
        }
        .chip-grid label:hover { border-color: var(--gold); }
        .chip-grid input { margin-top: 3px; accent-color: #C9A85C; }
        .chip-grid strong { font-size: 0.82em; color: var(--ivory); display: block; }
        .chip-grid small { font-size: 0.7em; color: var(--muted); }

        /* ===== Chat thread ===== */
        .thread-wrap {
            flex: 1; overflow-y: auto;
            padding: 20px 14px 10px;
        }
        .thread { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
        .msg { display: flex; flex-direction: column; max-width: 85%; animation: rise 0.25s ease-out; }
        @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        @media (prefers-reduced-motion: reduce) { .msg { animation: none; } }
        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.coach { align-self: flex-start; align-items: flex-start; }
        .bubble {
            padding: 13px 17px; border-radius: 10px;
            font-size: 0.95em; line-height: 1.7;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .msg.user .bubble {
            background: linear-gradient(135deg, var(--gold) 0%, #B8964A 100%);
            color: var(--ink); border-bottom-right-radius: 3px; font-weight: 500;
        }
        .msg.coach .bubble {
            background: var(--paper); color: var(--text);
            border: 1px solid var(--line); border-bottom-left-radius: 3px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
        }
        .msg .who {
            font-size: 0.68em; font-weight: 600; letter-spacing: 0.14em;
            text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
        }
        .bubble b { font-weight: 700; }
        .bubble .file-tag {
            display: inline-block; font-size: 0.8em; padding: 2px 10px; margin-bottom: 6px;
            background: rgba(11,11,13,0.14); border-radius: 20px; font-weight: 600;
        }
        .msg .actions { margin-top: 5px; }
        .msg .actions button {
            font-size: 0.68em; color: var(--muted); background: none; border: none;
            letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 6px;
        }
        .msg .actions button:hover { color: var(--gold-bright); }

        /* typing indicator */
        .typing .bubble { display: inline-flex; gap: 5px; align-items: center; padding: 16px 20px; }
        .typing .d { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); opacity: 0.4; animation: blink 1.2s infinite; }
        .typing .d:nth-child(2) { animation-delay: 0.2s; }
        .typing .d:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

        /* ===== Composer ===== */
        .composer-wrap {
            border-top: 1px solid var(--line);
            background: rgba(11,11,13,0.85);
            backdrop-filter: blur(14px);
            padding: 12px 14px calc(14px + env(safe-area-inset-bottom));
        }
        .composer { max-width: 900px; margin: 0 auto; }
        .doc-chip {
            display: none; align-items: center; gap: 8px;
            margin-bottom: 8px; padding: 6px 12px;
            background: rgba(201,168,92,0.1); border: 1px solid var(--line); border-radius: 20px;
            color: var(--gold-bright); font-size: 0.78em; width: fit-content;
        }
        .doc-chip button { background: none; border: none; color: var(--muted); font-size: 1.1em; line-height: 1; }
        .doc-chip button:hover { color: #ef4444; }
        .composer-row { display: flex; gap: 9px; align-items: flex-end; }
        .icon-btn {
            flex: 0 0 auto; width: 46px; height: 46px;
            border-radius: 6px; border: 1px solid var(--line);
            background: var(--charcoal); color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .icon-btn:hover { border-color: var(--gold); background: rgba(201,168,92,0.12); }
        .icon-btn svg { width: 20px; height: 20px; stroke: currentColor; }
        textarea#composerInput {
            flex: 1; resize: none;
            min-height: 46px; max-height: 150px;
            padding: 12px 15px;
            background: var(--charcoal); color: var(--ivory);
            border: 1px solid var(--line); border-radius: 6px;
            font-family: 'Inter', sans-serif; font-size: 0.95em; line-height: 1.5;
        }
        textarea#composerInput:focus { outline: none; border-color: var(--gold); }
        textarea#composerInput::placeholder { color: var(--muted); }
        #sendBtn {
            flex: 0 0 auto; height: 46px; padding: 0 26px;
            background: linear-gradient(135deg, var(--gold) 0%, #B8964A 100%);
            color: var(--ink); border: none; border-radius: 6px;
            font-weight: 700; font-size: 0.82em; letter-spacing: 0.12em; text-transform: uppercase;
            transition: all 0.2s ease;
        }
        #sendBtn:hover:not(:disabled) { background: var(--gold-bright); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .composer-foot {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 7px; font-size: 0.7em; color: var(--muted);
        }
        .composer-foot button {
            background: none; border: none; color: var(--muted);
            font-size: 1em; letter-spacing: 0.06em; text-transform: uppercase;
        }
        .composer-foot button:hover { color: var(--gold-bright); }
        .error-bar {
            display: none; max-width: 900px; margin: 0 auto 8px;
            padding: 9px 14px; border-radius: 6px;
            background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5; font-size: 0.82em;
        }
        @media (max-width: 640px) {
            .msg { max-width: 94%; }
            header h1 { font-size: 1.35em; }
        }
    </style>
</head>
<body>
    <nav class="topbar">
        <div class="nav-left">
            <a href="/" class="back-link" aria-label="Back to dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                Dashboard
            </a>
            <a href="/" class="brand-mini" aria-label="The Roundtable home">
                <svg viewBox="0 0 34 34" fill="none" aria-hidden="true">
                    <circle cx="17" cy="17" r="15.5" stroke="#C9A85C" stroke-width="1.4"/>
                    <circle cx="17" cy="17" r="3" fill="#C9A85C"/>
                    <circle cx="17" cy="6.5" r="1.6" fill="#C9A85C"/><circle cx="27.5" cy="17" r="1.6" fill="#C9A85C"/>
                    <circle cx="17" cy="27.5" r="1.6" fill="#C9A85C"/><circle cx="6.5" cy="17" r="1.6" fill="#C9A85C"/>
                    <circle cx="24.4" cy="9.6" r="1.6" fill="#C9A85C"/><circle cx="24.4" cy="24.4" r="1.6" fill="#C9A85C"/>
                    <circle cx="9.6" cy="24.4" r="1.6" fill="#C9A85C"/><circle cx="9.6" cy="9.6" r="1.6" fill="#C9A85C"/>
                </svg>
                <span>The Roundtable</span>
            </a>
        </div>
        <div class="nav-right">
            <span class="status-line"><span class="dot" id="apiDot"></span><span id="statusText">Connecting...</span></span>
            <button class="nav-btn" type="button" onclick="toggleAdvisors()">Advisors</button>
            <button class="nav-btn" type="button" onclick="newConversation()">New Chat</button>
        </div>
    </nav>

    <div class="setup">
        <details class="advisors">
            <summary>
                <span>Choose Your Advisors</span>
                <span class="count" id="advisorCount"></span>
            </summary>
            <div class="advisor-body">
                <div class="panel-actions">
                    <button type="button" onclick="setAllExperts(true)">Select All</button>
                    <button type="button" onclick="setAllExperts(false)">Clear All</button>
                </div>
                <div id="expertPanel"></div>
            </div>
        </details>
    </div>

    <div class="thread-wrap" id="threadWrap">
        <div class="thread" id="thread"></div>
    </div>

    <div class="composer-wrap">
        <div class="error-bar" id="errorBar"></div>
        <div class="composer">
            <div class="doc-chip" id="docChip">
                <span id="docChipName"></span>
                <button type="button" onclick="clearFile()" aria-label="Remove file">&times;</button>
            </div>
            <div class="composer-row">
                <input type="file" id="fileUpload" accept=".pdf,.txt,.doc,.docx,.jpg,.png,.jpeg,.xlsx,.xls,.csv" style="display:none;">
                <button class="icon-btn" type="button" onclick="document.getElementById('fileUpload').click()" aria-label="Attach a document">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea id="composerInput" rows="1" placeholder="Ask your panel anything - or attach a prelim, flyer, lead list, headshot..."></textarea>
                <button id="sendBtn" onclick="send()">Send</button>
            </div>
            <div class="composer-foot">
                <span>Enter to send &middot; Shift+Enter for a new line &middot; PDF, DOCX, XLSX, CSV, images</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://ask-ryan-nb3w.onrender.com';

        let conversationHistory = [];
        let documentContext = null;
        let documentName = null;
        let pendingFile = null;
        let busy = false;

        // ===== The Advisor Panel =====
        const EXPERT_GROUPS = [
            { group: 'Sales & Prospecting', experts: [
                ['serhant', 'Ryan Serhant', 'Luxury sales & branding'],
                ['harris', 'Tim & Julie Harris', 'Listing appointments & scripts'],
                ['mulrenin', 'Brandon Mulrenin', 'FSBO & expired prospecting'],
                ['carruthers', 'Ricky Carruth', 'Cold calling & relationships'],
            ]},
            { group: 'Coaching & Business', experts: [
                ['ferry', 'Tom Ferry', 'Coaching systems & planning'],
                ['buffini', 'Brian Buffini', 'Referrals & relationships'],
                ['keller', 'Gary Keller', 'Teams & wealth models'],
                ['sharran', 'Sharran Srivatsaa', 'Strategy, luxury & wealth'],
            ]},
            { group: 'Marketing & Media', experts: [
                ['glennda', 'Glennda Baker', 'Storytelling & social'],
                ['lazine', 'Byron Lazine', 'Market analysis & trends'],
                ['burgess', 'Jimmy Burgess', 'Listing attraction tactics'],
                ['pantana', 'Jason Pantana', 'Visual marketing & tech'],
                ['peitz', 'Chelsea Peitz', 'Visual social branding'],
            ]},
            { group: 'Negotiation', experts: [
                ['voss', 'Chris Voss', 'Negotiation psychology'],
            ]},
            { group: 'Design & Staging', experts: [
                ['gaines', 'Joanna Gaines', 'Design & lifestyle storytelling'],
                ['mcgee', 'Shea McGee', 'Design rules & transformations'],
                ['eisen', 'Cheryl Eisen', 'Luxury staging that sells'],
            ]},
            { group: 'Commercial', experts: [
                ['knakal', 'Bob Knakal', 'Investment sales'],
                ['cauble', 'Tyler Cauble', 'Leasing & small CRE'],
                ['mcelroy', 'Ken McElroy', 'Multifamily investing'],
            ]},
            { group: 'Flipping & Investing', experts: [
                ['tarek', 'Tarek El Moussa', 'Flipping & renovation ROI'],
                ['norton', 'Jerry Norton', 'Flips & wholesaling deals'],
                ['morby', 'Pace Morby', 'Creative finance & subject-to'],
                ['greene', 'David Greene', 'BRRRR & long-distance investing'],
            ]},
            { group: 'Probate, Divorce & Distressed', experts: [
                ['corbett', 'Chad Corbett', 'Probate systems & outreach'],
                ['nicoletti', 'Al Nicoletti', 'Probate legal strategy (attorney)'],
                ['gross', 'Bill Gross', 'CA probate court process'],
                ['starks', 'Laurel Starks', 'Divorce & family-law collaboration'],
                ['espinosa', 'Nicole Espinosa', 'Short sales, NOD & pre-foreclosure'],
                ['ted', 'Ted Thomas', 'Tax liens & tax defaults'],
            ]},
            { group: 'Español & Bilingual', experts: [
                ['loida', 'Loida Velasquez', 'Bilingual (EN/ES) prospecting'],
                ['figueroa', 'Veronica Figueroa', 'Latino homebuyer market'],
                ['creyes', 'Carlos Reyes', 'Investing & wholesaling en español'],
                ['rene', 'Rene Rodriguez', 'Sales psychology & influence'],
            ]},
        ];

        function renderExpertPanel() {
            const panel = document.getElementById('expertPanel');
            panel.innerHTML = EXPERT_GROUPS.map(g => `
                <div class="group-label">${g.group}</div>
                <div class="chip-grid">
                    ${g.experts.map(([id, name, focus]) => `
                        <label>
                            <input type="checkbox" class="expert-cb" value="${id}" checked onchange="updateAdvisorCount()">
                            <span><strong>${name}</strong><small>${focus}</small></span>
                        </label>
                    `).join('')}
                </div>
            `).join('');
            updateAdvisorCount();
        }
        function getSelectedExperts() {
            return Array.from(document.querySelectorAll('.expert-cb:checked')).map(cb => cb.value);
        }
        function setAllExperts(checked) {
            document.querySelectorAll('.expert-cb').forEach(cb => cb.checked = checked);
            updateAdvisorCount();
        }
        function updateAdvisorCount() {
            const n = getSelectedExperts().length;
            document.getElementById('advisorCount').textContent =
                n + ' of 34 seated' + (n > 0 && n <= 8 ? ' · deep-dossier mode' : '');
        }

        // ===== Thread rendering =====
        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function formatCoach(text) {
            return esc(text).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
        }
        function addMsg(role, text, opts = {}) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const who = role === 'user' ? 'You' : 'The Roundtable';
            let inner = '';
            if (opts.fileTag) inner += `<span class="file-tag">&#128206; ${esc(opts.fileTag)}</span><br>`;
            inner += role === 'coach' ? formatCoach(text) : esc(text);
            div.innerHTML = `<span class="who">${who}</span><div class="bubble">${inner}</div>`;
            if (role === 'coach') {
                const act = document.createElement('div');
                act.className = 'actions';
                const btn = document.createElement('button');
                btn.textContent = 'Copy';
                btn.onclick = () => { navigator.clipboard.writeText(text); btn.textContent = 'Copied'; setTimeout(() => btn.textContent = 'Copy', 1500); };
                act.appendChild(btn);
                div.appendChild(act);
            }
            document.getElementById('thread').appendChild(div);
            scrollDown();
            return div;
        }
        function addTyping() {
            const div = document.createElement('div');
            div.className = 'msg coach typing';
            div.id = 'typing';
            div.innerHTML = `<span class="who">The Roundtable</span><div class="bubble"><span class="d"></span><span class="d"></span><span class="d"></span></div>`;
            document.getElementById('thread').appendChild(div);
            scrollDown();
        }
        function removeTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }
        function scrollDown() {
            const w = document.getElementById('threadWrap');
            w.scrollTop = w.scrollHeight;
        }
        function showError(msg) {
            const bar = document.getElementById('errorBar');
            bar.textContent = msg;
            bar.style.display = 'block';
            setTimeout(() => bar.style.display = 'none', 8000);
        }

        // ===== Send flow =====
        async function send() {
            if (busy) return;
            const input = document.getElementById('composerInput');
            const question = input.value.trim();
            if (!question && !pendingFile) return;

            busy = true;
            document.getElementById('sendBtn').disabled = true;

            const fileTag = pendingFile ? pendingFile.name : null;
            addMsg('user', question || 'Review this for me.', { fileTag });
            input.value = '';
            autoGrow(input);
            addTyping();

            try {
                let data;
                if (pendingFile) {
                    const fd = new FormData();
                    fd.append('file', pendingFile);
                    if (question) fd.append('query', question);
                    fd.append('experts', JSON.stringify(getSelectedExperts()));
                    const res = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: fd });
                    if (!res.ok) throw new Error(`API error ${res.status}`);
                    data = await res.json();
                    documentContext = data.extracted_text || null;
                    documentName = pendingFile.name;
                    conversationHistory.push({ role: 'user', content: `[I uploaded a document: ${documentName}] ${question || 'Review this for me.'}` });
                    clearFile();
                } else {
                    const res = await fetch(`${API_URL}/api/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: question,
                            history: conversationHistory.slice(-12),
                            context: documentContext,
                            experts: getSelectedExperts()
                        })
                    });
                    if (!res.ok) throw new Error(`API error ${res.status}`);
                    data = await res.json();
                    conversationHistory.push({ role: 'user', content: question });
                }
                const reply = data.response.text;
                conversationHistory.push({ role: 'assistant', content: reply });
                removeTyping();
                addMsg('coach', reply);
                document.getElementById('composerInput').placeholder = 'Reply to your panel...';
            } catch (e) {
                removeTyping();
                showError('The panel is waking up (free hosting sleeps after 15 idle minutes - the first message can take ~1 minute). Your message was not lost: try sending it again.');
                console.error(e);
            } finally {
                busy = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function newConversation() {
            conversationHistory = [];
            documentContext = null;
            documentName = null;
            clearFile();
            document.getElementById('thread').innerHTML = '';
            document.getElementById('composerInput').placeholder = 'Ask your panel anything - or attach a prelim, flyer, lead list, headshot...';
            welcome();
        }

        function clearFile() {
            pendingFile = null;
            document.getElementById('fileUpload').value = '';
            document.getElementById('docChip').style.display = 'none';
        }

        function toggleAdvisors() {
            const d = document.querySelector('details.advisors');
            d.open = !d.open;
            if (d.open) d.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ===== Wiring =====
        document.getElementById('fileUpload').addEventListener('change', function (e) {
            const f = e.target.files[0];
            if (!f) return;
            if (f.size > 10 * 1024 * 1024) { showError('File is over 10MB.'); this.value = ''; return; }
            pendingFile = f;
            document.getElementById('docChipName').textContent = f.name;
            document.getElementById('docChip').style.display = 'flex';
            document.getElementById('composerInput').focus();
        });

        const composer = document.getElementById('composerInput');
        composer.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        function autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }
        composer.addEventListener('input', () => autoGrow(composer));

        async function checkApiStatus() {
            const dot = document.getElementById('apiDot');
            const txt = document.getElementById('statusText');
            try {
                const r = await fetch(`${API_URL}/api/health`);
                if (r.ok) { dot.className = 'dot online'; txt.textContent = 'Panel connected'; return; }
                throw 0;
            } catch {
                dot.className = 'dot offline'; txt.textContent = 'Waking the panel (~1 min on first visit)';
            }
        }

        function welcome() {
            addMsg('coach', 'Welcome to The Roundtable. Seat your advisors above (fewer seats = deeper expertise), then ask anything - scripts, deal math, staging, probate, negotiation - o pregunta en español. You can also attach a prelim, lead list, flyer, or headshot with the paperclip.');
        }

        renderExpertPanel();
        welcome();
        checkApiStatus();
        setInterval(checkApiStatus, 30000);
    </script>
</body>
</html>
